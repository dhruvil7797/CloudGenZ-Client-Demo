<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>United in Pride — Design Gallery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0812;
        --surface: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.08);
        --text: #f0eeff;
        --muted: rgba(240, 238, 255, 0.5);
        --purple: #a855f7;
        --pink: #ec4899;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
      }

      .header {
        max-width: 1280px;
        margin: 0 auto;
        padding: 48px 40px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .brand-name {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      .brand-sub {
        font-size: 13px;
        color: var(--muted);
        margin-top: 1px;
      }
      .header-count {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 7px 16px;
        font-size: 13px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .live-dot {
        width: 7px;
        height: 7px;
        background: #22c55e;
        border-radius: 50%;
        animation: blink 2s ease infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      .rainbow {
        height: 3px;
        background: linear-gradient(
          to right,
          #ef4444,
          #f97316,
          #eab308,
          #22c55e,
          #3b82f6,
          #8b5cf6,
          #ec4899
        );
      }

      .section {
        max-width: 1280px;
        margin: 0 auto;
        padding: 56px 40px;
      }
      .section + .section {
        padding-top: 0;
      }
      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .section-label em {
        font-style: normal;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .card:hover {
        transform: translateY(-6px);
        border-color: rgba(168, 85, 247, 0.35);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }
      .card-thumb {
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .card-thumb-num {
        font-family: "Fraunces", serif;
        font-size: 80px;
        font-weight: 900;
        line-height: 1;
        opacity: 0.25;
        color: white;
        transition: opacity 0.3s;
      }
      .card:hover .card-thumb-num {
        opacity: 0.4;
      }
      .card-series-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 4px 10px;
        border-radius: 50px;
      }
      .card-body {
        padding: 18px 20px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .card-title {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
      }
      .card-arrow {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(168, 85, 247, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: var(--purple);
        transition: all 0.3s;
      }
      .card:hover .card-arrow {
        background: linear-gradient(135deg, var(--purple), var(--pink));
        color: white;
        transform: translateX(2px);
      }

      .footer {
        max-width: 1280px;
        margin: 0 auto;
        padding: 32px 40px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      .footer p {
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .header {
          padding: 28px 20px;
        }
        .section {
          padding: 36px 20px;
        }
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
          gap: 12px;
        }
        .footer {
          padding: 24px 20px;
        }
      }

      @keyframes kineticBg {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <body>
