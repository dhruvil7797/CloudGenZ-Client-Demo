<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NewLife Project Inc. — Design Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}

    .header{background:#fff;border-bottom:1px solid #e5e5e5;padding:20px clamp(20px,4vw,48px);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-icon{width:36px;height:36px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .brand-name{font-size:15px;font-weight:700;color:#111;letter-spacing:-.3px}
    .brand-sub{font-size:12px;color:#888;margin-top:1px}
    .badge{background:#f0f0f0;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:#555;display:flex;align-items:center;gap:6px}
    .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s ease infinite}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

    .main{max-width:1240px;margin:0 auto;padding:36px clamp(20px,4vw,48px) 60px}

    .label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:20px}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

    .card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s,transform .2s}
    .card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:#d0d0d0;transform:translateY(-3px)}
    .thumb{height:150px;position:relative;overflow:hidden;flex-shrink:0}
    .thumb-num{position:absolute;bottom:12px;left:14px;font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase}
    .thumb-tag{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.04em;text-transform:uppercase}
    .info{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .info-name{font-size:14px;font-weight:600;color:#111}
    .info-palette{font-size:11px;color:#999;margin-top:2px;font-weight:400}
    .arrow{width:26px;height:26px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#555;flex-shrink:0;transition:background .2s,color .2s}
    .card:hover .arrow{background:#111;color:#fff}

    .footer{border-top:1px solid #e5e5e5;padding:20px clamp(20px,4vw,48px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:#fff}
    .footer p{font-size:12px;color:#aaa}

    @media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}}
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🌱</div>
      <div>
        <div class="brand-name">NewLife Project Inc.</div>
        <div class="brand-sub">Website Redesigns by CloudGenZ</div>
      </div>
    </div>
    <div class="badge"><div class="dot"></div><span id="cnt">14 Designs</span></div>
  </div>

  <div class="main">
    <div class="label" id="lbl">14 Concepts</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    <p>NewLife Project Inc. × CloudGenZ</p>
    <p>© 2026 CloudGenZ Technologies Pvt Ltd</p>
  </div>

  <script>
    const designs = [
      {folder:'design1',name:'Roots',palette:'Terracotta · Gold · Brown',tag:'Editorial',bg:'linear-gradient(135deg,#c4522a,#2c1810)'},
      {folder:'design2',name:'Virtue',palette:'Forest Green · Gold',tag:'Clean',bg:'linear-gradient(135deg,#2e7d32,#0a3d0a)'},
      {folder:'design3',name:'Ubuntu',palette:'Kente Red · Gold · Black',tag:'Bold',bg:'linear-gradient(135deg,#8b1a1a,#e8a800)'},
      {folder:'design4',name:'Bloom',palette:'Rose · Plum · Sage',tag:'Soft',bg:'linear-gradient(135deg,#c97b84,#4a1942)'},
      {folder:'design5',name:'Harvest',palette:'Burnt Sienna · Turmeric',tag:'Kinetic',bg:'linear-gradient(135deg,#b5451b,#2c1a0a)'},
      {folder:'design6',name:'Genesis',palette:'Monochrome · Green Accent',tag:'Minimal',bg:'linear-gradient(135deg,#141210,#3d7a3d)'},
      {folder:'design7',name:'Serengeti',palette:'Olive · Khaki · Rust',tag:'Organic',bg:'linear-gradient(135deg,#4a5c2a,#a0522d)'},
      {folder:'design8',name:'Kente',palette:'Gold · Black · Green · Red',tag:'Heritage',bg:'repeating-linear-gradient(135deg,#d4af37 0,#d4af37 16px,#111 16px,#111 32px,#2e7d32 32px,#2e7d32 48px,#c0392b 48px,#c0392b 64px)'},
      {folder:'design9',name:'Chronicle',palette:'Ink · Paper · Red',tag:'Magazine',bg:'linear-gradient(135deg,#1a1a1a,#c8a84b)'},
      {folder:'design10',name:'Foundation',palette:'Navy · Gold · White',tag:'Corporate',bg:'linear-gradient(135deg,#1a2744,#c8a84b)'},
      {folder:'design11',name:'Momentum',palette:'Deep Teal · Coral',tag:'Landing',bg:'linear-gradient(135deg,#0d5c63,#e8614a)'},
      {folder:'design12',name:'Legacy',palette:'Burgundy · Ivory · Forest',tag:'Immersive',bg:'linear-gradient(135deg,#5c1a2a,#2d5c2a)'},
      {folder:'design13',name:'Gateway',palette:'Slate · Amber',tag:'Portal',bg:'linear-gradient(135deg,#2c3e50,#e8a800)'},
      {folder:'design14',name:'Covenant',palette:'Warm Brown · Gold',tag:'Ministry',bg:'linear-gradient(135deg,#6b2c0a,#c8a84b)'},
    ];

    document.getElementById('cnt').textContent = designs.length + ' Designs';
    document.getElementById('lbl').textContent = designs.length + ' Concepts';

    document.getElementById('grid').innerHTML = designs.map((d,i)=>`
      <a href="${d.folder}/" class="card">
        <div class="thumb" style="background:${d.bg}">
          <div class="thumb-num">${String(i+1).padStart(2,'0')} — ${d.name}</div>
          <div class="thumb-tag">${d.tag}</div>
        </div>
        <div class="info">
          <div>
            <div class="info-name">${d.name}</div>
            <div class="info-palette">${d.palette}</div>
          </div>
          <div class="arrow">→</div>
        </div>
      </a>`).join('');
  </script>
</body>
</html>
